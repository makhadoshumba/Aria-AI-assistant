<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.png" />

    <title>Aria-AI Assistant</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">
      <!-- SIDEBAR -->

      <aside class="sidebar">
        <a href="index.html" class="brand-link">
          <div class="brand">
            <div class="orb"></div>

            <h2>Aria</h2>
          </div>
        </a>

        <button class="new-chat" id="newChat">+ New Chat</button>

        <h4>History</h4>

        <div class="history" id="history">
          <!-- Generated dynamically -->
        </div>
        <footer class="sidebar-footer">
          <p>Built by Shumba Makhado</p>
        </footer>
      </aside>

      <div id="overlay" class="overlay"></div>
      <!-- MAIN -->

      <main class="main">
        <header>
          <button id="menuBtn" class="menu-btn">☰</button>

          <a href="index.html" class="brand-link">
            <h3>Aria AI</h3>
          </a>

          <span>Llama Model</span>
        </header>

        <section id="chat">
          <div class="welcome">
            <div class="big-orb"></div>

            <h1>Where should we begin?</h1>

            <p>Ask anything and Aria will help you.</p>
          </div>
        </section>

        <div class="input-container">
          <input id="message" placeholder="Message Aria..." />

          <button id="send">↑</button>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
