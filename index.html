<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aria AI Assistant</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="brand">
            <div class="orb"></div>
            <h2>Aria</h2>
        </div>


        <button class="new-chat">
            + New Chat
        </button>


        <h4>History</h4>


        <div class="history">

            <p>AI Assistant chat</p>
            <p>AWS Lambda questions</p>
            <p>Cloud architecture</p>

        </div>


    </aside>




    <!-- MAIN CHAT AREA -->


    <main class="main">


        <header>

            <h3>
                Aria AI
            </h3>

            <span>
                Llama Model
            </span>

        </header>



        <section id="chat">


            <div class="welcome">

                <div class="big-orb"></div>

                <h1>
                    Where should we begin?
                </h1>

                <p>
                    Ask anything and Aria will help you.
                </p>


            </div>


        </section>




        <div class="input-container">


            <input 
            id="message"
            placeholder="Message Aria..."
            >


            <button id="send">

                ↑

            </button>


        </div>



    </main>


</div>


<script src="script.js"></script>

</body>

</html>
